name: Build Desktop Executable
on: [push]

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Monorepo Dependencies
        working-directory: ./AuditDiff
        run: |
          npm install

      - name: Package Desktop Executable
        working-directory: ./AuditDiff
        # Changed this to use your project's custom distribution builder!
        run: |
          npm run dist
